name: Drain Agent Jobs

on:
  schedule:
    # Every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  drain:
    name: Drain pending agent jobs
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: POST /api/cron/drain-jobs
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/cron/drain-jobs" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "Response status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "::error::drain-jobs returned HTTP $STATUS"
            exit 1
          fi
